<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Snug-Hoose</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 1rem; }
    pre { background:#f6f8fa; padding: .5rem; max-height:40vh; overflow:auto }
  </style>
</head>
<body>
  <h3>Snug-Hoose</h3>

  <div>
    <label>
      Indoor target temperature (°C)
      <input id="indoorTemp" type="number" value="21" step="0.5" />
    </label>
    <label>
      External temperature (°C)
      <input id="externalTemp" type="number" value="3" step="0.5" />
    </label>
    <label>
      Radiator flow temperature (°C)
      <input id="flowTemp" type="number" value="55" step="1" />
    </label>
    <p style="margin:.25rem 0 1rem 0">Provide JSON in the embedded scripts or serve the repo so the app fetches the files.</p>
    <button id="run">Calculate U-values, Radiator Output & Heating Balance</button>
    <a id="download" download="demo_house.solved.json" style="margin-left:.5rem; pointer-events:none; opacity:.5">Download solved JSON</a>
  </div>

  <pre id="out"></pre>

  <script type="module" src="./source/scripts/solver.js"></script>
</body>
</html>
