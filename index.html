<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Snug-Hoose</title>
  <link rel="stylesheet" href="./style/main.css" />
</head>
<body>
  <h3>Snug-Hoose</h3>

  <div class="control-panel">
    <div class="control-row">
      <label>
        Indoor target temperature (°C)
        <input id="indoorTemp" type="number" value="21" step="0.5" />
      </label>
      <label>
        External temperature (°C)
        <input id="externalTemp" type="number" value="3" step="0.5" />
      </label>
      <label>
        Radiator flow temperature (°C)
        <input id="flowTemp" type="number" value="55" step="1" />
      </label>
      <label style="position: relative; overflow: hidden;">
        Import house JSON
        <input id="fileUpload" type="file" accept=".json" style="position: absolute; opacity: 0; width: 0; height: 0;" />
        <button id="uploadBtn" style="margin-top: 0.5rem;">Choose File</button>
      </label>
      <a id="download" download="demo_house.solved.json" style="margin-left: 0;">Download solved JSON</a>
    </div>
    <p class="info-text">Temperature inputs update immediately. Upload a JSON file or use the default demo house (auto-loaded).</p>
  </div>

  <div class="thermal-viz">
    <h4>Heating Balance by Floor</h4>
    <div id="thermal-container"></div>
  </div>

  <h4>Detailed Output</h4>
  <pre id="out"></pre>

  <script type="module" src="./source/scripts/solver.js"></script>
</body>
</html>
