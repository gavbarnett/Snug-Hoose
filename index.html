<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Snug-Hoose</title>
  <link rel="stylesheet" href="./style/main.css" />
</head>
<body>
  <h3>Snug-Hoose</h3>

  <div class="content-layout sidebar-hidden">
    <div class="content-left">
      <h4>Visualization</h4>
      <div id="altVizPanel" class="viz-panel active">
        <div id="alt-viz-container" class="alt-viz-empty"></div>
      </div>
    </div>
    <div class="content-right">
      <div class="editor-tabs">
        <button id="editorTab" class="tab-button active">Room Editor</button>
      </div>
      <div id="roomEditorPanel" class="editor-panel active">
        <h4>Room Editor</h4>
        <div id="roomSelector">
          <p>Click on a room in the visualization to edit its properties.</p>
        </div>
        <div id="roomEditor" style="display: none;">
          <h5 id="selectedRoomName">Selected Room: None</h5>
          <div class="editor-section">
            <h6>Info</h6>
            <div id="roomMetaList"></div>
          </div>
          <div class="editor-section">
            <h6>Radiators</h6>
            <div id="radiatorsList"></div>
          </div>
          <div class="editor-section">
            <h6>Fabric</h6>
            <div id="fabricList"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="./source/scripts/solver.js"></script>
</body>
</html>
