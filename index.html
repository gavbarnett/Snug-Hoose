<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Snug-Hoose</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 1rem; }
    pre { background:#f6f8fa; padding: .5rem; max-height:40vh; overflow:auto }
    
    .thermal-viz { margin-top: 2rem; }
    .thermal-table { width: 100%; border-collapse: collapse; margin-bottom: 1rem; }
    .thermal-table th, .thermal-table td { border: 1px solid #ccc; padding: 0.5rem; text-align: left; }
    .thermal-table th { background: #f0f0f0; font-weight: bold; }
    
    .thermal-zone-cell { 
      min-height: 120px; 
      display: flex; 
      flex-direction: column; 
      justify-content: center; 
      align-items: center; 
      text-align: center; 
      font-weight: bold;
      border-radius: 4px;
      padding: 1rem;
      color: white;
      text-shadow: 0 1px 2px rgba(0,0,0,0.3);
    }
    
    .zone-name { font-size: 1.1em; margin-bottom: 0.3rem; }
    .zone-balance { font-size: 0.9em; margin: 0.2rem 0; }
    .zone-radiator { font-size: 0.8em; margin: 0.2rem 0; }
    
    .thermal-extreme-cold { background: linear-gradient(135deg, #0033ff, #0066ff); }
    .thermal-cold { background: linear-gradient(135deg, #0099ff, #00ccff); }
    .thermal-cool { background: linear-gradient(135deg, #00ff99, #00ff66); }
    .thermal-neutral { background: linear-gradient(135deg, #ffff00, #ffcc00); }
    .thermal-warm { background: linear-gradient(135deg, #ffaa00, #ff8800); }
    .thermal-hot { background: linear-gradient(135deg, #ff4400, #ff0000); }
    .thermal-extreme-hot { background: linear-gradient(135deg, #dd0000, #aa0000); }
  </style>
</head>
<body>
  <h3>Snug-Hoose</h3>

  <div>
    <label>
      Indoor target temperature (°C)
      <input id="indoorTemp" type="number" value="21" step="0.5" />
    </label>
    <label>
      External temperature (°C)
      <input id="externalTemp" type="number" value="3" step="0.5" />
    </label>
    <label>
      Radiator flow temperature (°C)
      <input id="flowTemp" type="number" value="55" step="1" />
    </label>
    <p style="margin:.25rem 0 1rem 0">Provide JSON in the embedded scripts or serve the repo so the app fetches the files.</p>
    <button id="run">Calculate U-values, Radiator Output & Heating Balance</button>
    <a id="download" download="demo_house.solved.json" style="margin-left:.5rem; pointer-events:none; opacity:.5">Download solved JSON</a>
  </div>

  <div class="thermal-viz">
    <h4>Heating Balance by Floor</h4>
    <div id="thermal-container"></div>
  </div>

  <h4>Detailed Output</h4>
  <pre id="out"></pre>

  <script type="module" src="./source/scripts/solver.js"></script>
</body>
</html>
